title: "⭐ Epic 8: Slice Vertical: Batalha"
state: "open"
description: |
  Implementar o fluxo completo de uma batalha, desde o setup inicial dos personagens e inimigos, gerenciamento de energia através de dados, o ciclo de rounds e turnos, até as condições de finalização da batalha e apresentação do resultado.
sub-issues:
  - title: "📖 Story 8.1: Setup Inicial da Batalha"
    type: "📖 Feature / Story"
    state: "open"
    description: |
      Como jogador, quero que a batalha comece com meus personagens e inimigos posicionados na grid para que o combate possa ser iniciado.
    sub-issues:
      - title: "📝 Task 8.1.1: Configurar posicionamento automático de personagens na grid"
        type: "📝 Task"
        state: "open"
        description: |
          Implementar sistema que:
          - Cria grids de batalha (2x3) para player e inimigos
          - Define posições configuráveis via PlayerGridPosition e EnemyGridPosition
          - Posiciona automaticamente personagens nas células disponíveis
      - title: "📝 Task 8.1.2: Implementar sistema de geração e posicionamento de times"
        type: "📝 Task"
        state: "open"
        description: |
          Configurar BattleController para:
          - Gerar inimigos a partir de EnemyCharacterStore
          - Combinar times de player e inimigos
          - Emitir eventos para posicionamento automático
      - title: "📝 Task 8.1.3: Integrar personagens na fila de iniciativa"
        type: "📝 Task"
        state: "open"
        description: |
          QueueController deve:
          - Receber evento CharactersPositioned
          - Calcular ordem de iniciativa baseada no atributo Speed
          - Criar fila ordenada para controle de turnos

  - title: "📖 Story 8.2: Gerenciamento de Energia"
    type: "📖 Feature / Story"
    state: "open"
    description: |
      Como personagem, quero rolar meus dados no início do meu turno para ganhar energia e poder usá-la em ações.
    sub-issues:
      - title: "📝 Task 8.2.1: Validar configuração de dados nos recursos CharacterType"
        type: "📝 Task"
        state: "open"
        description: |
          Verificar que:
          - PlayerVillager.tres tem TestingDice.tres equipado
          - EnemyVillager.tres tem dados configurados
          - Propriedade EquippedDice está populada corretamente
      - title: "📝 Task 8.2.2: Integrar rolagem de energia na fase de declaração de ações"
        type: "📝 Task"
        state: "open"
        description: |
          ActionsController deve:
          - Rolar dados para jogadores na StartActionsDeclaration()
          - Chamar RollEquippedDiceForEnergy() para cada personagem
          - Emitir evento PlayerEnergyRolled após rolagem
      - title: "📝 Task 8.2.3: Validar atualização automática de energia após rolagem"
        type: "📝 Task"
        state: "open"
        description: |
          Sistema deve:
          - Limpar AvailableEnergy antes da rolagem
          - Adicionar energias roladas à AvailableEnergy
          - Garantir que energia está disponível para validação de ações
      - title: "📝 Task 8.2.4: Validar sistema de consumo de energia durante execução de ações"
        type: "📝 Task"
        state: "open"
        description: |
          ActionService deve:
          - Validar energia suficiente com CanAffordAction()
          - Consumir energia após execução com ConsumeEnergy()
          - Ser chamado pelo TurnController durante ExecuteCharacterAction()

  - title: "📖 Story 8.3: Ciclo Básico de Round e Turnos"
    type: "📖 Feature / Story"
    state: "open"
    description: |
      Como sistema, quero gerenciar a progressão dos turnos e rounds de forma ordenada para que a batalha siga uma estrutura lógica.
    sub-issues:
      - title: "📝 Task 8.3.1: Validar sistema de iniciativa baseado em atributo Speed"
        type: "📝 Task"
        state: "open"
        description: |
          QueueController deve:
          - Calcular iniciativa usando atributo Speed dos personagens
          - Ordenar fila em ordem decrescente de iniciativa
          - Criar fila ordenada automaticamente no início da batalha
      - title: "📝 Task 8.3.2: Validar progressão sequencial de turnos"
        type: "📝 Task"
        state: "open"
        description: |
          TurnController deve:
          - Obter próximo personagem da fila via QueueController.GetNextCharacter()
          - Executar turno do personagem atual
          - Avançar automaticamente para próximo personagem
          - Emitir TurnsResolved quando fila estiver vazia
      - title: "📝 Task 8.3.3: Validar transição automática entre rounds"
        type: "📝 Task"
        state: "open"
        description: |
          RoundController deve:
          - Detectar fim de round via evento TurnsResolved
          - Verificar condições de continuidade da batalha
          - Iniciar próximo round automaticamente se ambos os times estão vivos
          - Integrar com BattleResultsController para fim de batalha
      - title: "📝 Task 8.3.4: Implementar tie-breaking aleatório para iniciativa"
        state: "open"
        description: |
          QueueController deve:
          - Adicionar tie-breaking aleatório quando personagens têm mesma iniciativa
          - Usar ThenBy(c => GD.Randf()) na ordenação

  - title: "📖 Story 8.4: Condições de Fim de Batalha"
    type: "📖 Feature / Story"
    state: "open"
    description: |
      Como sistema, quero detectar o fim da batalha quando um dos lados for completamente derrotado para declarar um vencedor.
    sub-issues:
      - title: "📝 Task 8.4.1: Validar verificação automática de fim de batalha"
        type: "📝 Task"
        state: "open"
        description: |
          Sistema verifica automaticamente ao fim de cada round:
          - RoundController.CheckBattleState() verifica HP de ambos os times
          - TurnController.ShouldContinueBattle() valida continuidade
          - Usa atributo Health para determinar personagens vivos
      - title: "📝 Task 8.4.2: Validar integração automática com BattleResultsController"
        type: "📝 Task"
        state: "open"
        description: |
          Sistema integra automaticamente via eventos:
          - RoundEnded event dispara BattleResultsController.CheckBattleResult()
          - CheckVictoryCondition() e CheckDefeatCondition() validam times
          - EmitBattleResultChecked() e TransitionToPostBattle() executam transição
      - title: "📝 Task 8.4.3: Completar integração de exibição de resultados"
        type: "📝 Task"
        state: "open"
        description: |
          Finalizar integração entre BattleResultsController e PostBattleController:
          - Console logging já implementado
          - Adicionar chamadas diretas ao PostBattleController
          - Garantir que ShowVictoryScreen/ShowGameOverScreen sejam executados
